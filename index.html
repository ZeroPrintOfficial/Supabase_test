<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Supabase Auth App</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 360px;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-primary { background: #3b82f6; color: white; }
    .btn-danger { background: #ef4444; color: white; }

    .tabs {
      display: flex;
      margin-bottom: 10px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      background: #1f2937;
    }

    .tab.active {
      background: #3b82f6;
    }

    #dashboard {
      display: none;
      text-align: center;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      padding: 10px 15px;
      border-radius: 8px;
      opacity: 0;
      transition: 0.3s;
    }

    .toast.show {
      opacity: 1;
    }

    .success { border-left: 5px solid #22c55e; }
    .error { border-left: 5px solid #ef4444; }
    .info { border-left: 5px solid #3b82f6; }
  </style>
</head>

<body>

<div class="card">

  <!-- AUTH -->
  <div id="auth">
    <h2>Welcome</h2>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Login</div>
      <div class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button class="btn-primary" onclick="handleAction()">Continue</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <h2>Dashboard</h2>
    <p id="userEmail"></p>
    <button class="btn-danger" onclick="logout()">Logout</button>
  </div>

</div>

<div id="toast" class="toast"></div>

<script>
  // Supabase setup
  const supabaseUrl = "https://nerbfazadyzeqhwgxjyi.supabase.co";
  const supabaseKey = "sb_publishable_nnGcs-OLdYbN8KYRr8-QNQ_77QBFXCg";
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  let mode = "login";

  function switchTab(type) {
    mode = type;

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    event.target.classList.add("active");

    showToast(`Switched to ${type}`, "info");
  }

  function showToast(msg, type="info") {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = `toast show ${type}`;

    setTimeout(() => {
      toast.classList.remove("show");
    }, 2500);
  }

  async function handleAction() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
      showToast("Fill in all fields", "error");
      return;
    }

    if (mode === "signup") {
      showToast("Creating account...", "info");

      const { error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: "https://zeroprintofficial.github.io/Supabase_test/"
        }
      });

      if (error) return showToast(error.message, "error");

      showToast("Check your email to confirm!", "success");
    } 
    else {
      showToast("Logging in...", "info");

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) return showToast(error.message, "error");

      showDashboard(data.user);
    }
  }

  function showDashboard(user) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("userEmail").textContent = user.email;

    showToast("Login successful", "success");
  }

  async function logout() {
    await supabaseClient.auth.signOut();

    document.getElementById("auth").style.display = "block";
    document.getElementById("dashboard").style.display = "none";

    showToast("Logged out", "info");
  }

  async function checkSession() {
    const { data } = await supabaseClient.auth.getSession();

    if (data.session) {
      showDashboard(data.session.user);
    }
  }

  checkSession();
</script>

</body>
</html>
