<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroPrint Portal</title>

<style>
:root{
    --bg:#030712;
    --card:#111827;
    --accent:#3b82f6;
    --text:#fff;
    --muted:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top left,#2563eb40,transparent 40%),
                radial-gradient(circle at bottom right,#06b6d440,transparent 40%),
                var(--bg);
    color:var(--text);
}

/* CARD */
.card{
    width:420px;
    background:rgba(17,24,39,.85);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:30px;
    backdrop-filter:blur(18px);
    box-shadow:0 20px 60px rgba(0,0,0,.5);
}

/* LOGO */
.logo{
    width:70px;
    height:70px;
    margin:auto;
    border-radius:18px;
    background:linear-gradient(135deg,#3b82f6,#06b6d4);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:bold;
}

/* TEXT */
h1{text-align:center;margin-top:10px;}
p{text-align:center;color:var(--muted);}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}

/* BUTTONS */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.primary{background:var(--accent);color:white;}
.secondary{background:#1f2937;color:white;}
.danger{background:#ef4444;color:white;}

/* STATUS */
#status{
    text-align:center;
    margin-top:10px;
    color:#38bdf8;
}

/* DASHBOARD */
.dashboard{
    display:none;
}

.box{
    background:#0f172a;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
    border:1px solid rgba(255,255,255,.05);
}

.small{
    font-size:13px;
    color:var(--muted);
}
</style>
</head>
<body>

<div class="card">

    <div class="logo">Z</div>
    <h1>ZeroPrint</h1>
    <p>Testing Environment</p>

    <!-- LOGIN AREA -->
    <div id="authBox">

        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">

        <button class="primary" onclick="login()">Login</button>
        <button class="secondary" onclick="signup()">Create Account</button>

        <div id="status"></div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="dashboard">

        <h2>Welcome 👋</h2>
        <p id="userEmail" class="small"></p>

        <div class="box">
            <h3>Where to get started</h3>
            <p class="small">
                • Explore your Supabase database<br>
                • Add user profiles table<br>
                • Build secure API routes<br>
                • Expand dashboard features
            </p>
        </div>

        <div class="box">
            <h3>Status</h3>
            <p class="small">You are successfully logged in.</p>
        </div>

        <button class="danger" onclick="logout()">Logout</button>
    </div>

</div>

<script type="module">

import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://nerbfazadyzeqhwgxjyi.supabase.co",
  "sb_publishable_nnGcs-OLdYbN8KYRr8-QNQ_77QBFXCg"
);

const authBox = document.getElementById("authBox");
const dashboard = document.getElementById("dashboard");
const status = document.getElementById("status");
const userEmail = document.getElementById("userEmail");

/* CHECK SESSION ON LOAD */
async function checkUser(){
    const { data } = await supabase.auth.getSession();

    if(data.session){
        showDashboard(data.session.user);
    }
}
checkUser();

/* LOGIN */
window.login = async () => {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    status.textContent = "Logging in...";

    const { data, error } =
    await supabase.auth.signInWithPassword({
        email,
        password
    });

    if(error){
        status.textContent = error.message;
        return;
    }

    showDashboard(data.user);
};

/* SIGNUP */
window.signup = async () => {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    status.textContent = "Creating account...";

    const { error } =
    await supabase.auth.signUp({
        email,
        password,
        options:{
            emailRedirectTo: window.location.origin
        }
    });

    if(error){
        status.textContent = error.message;
        return;
    }

    status.textContent = "Check your email to confirm login.";
};

/* LOGOUT */
window.logout = async () => {
    await supabase.auth.signOut();
    location.reload();
};

/* SHOW DASHBOARD */
function showDashboard(user){

    authBox.style.display = "none";
    dashboard.style.display = "block";

    userEmail.textContent = user.email;
}

</script>

</body>
</html>
