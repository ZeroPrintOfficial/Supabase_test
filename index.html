<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroPrint Portal</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:#030712;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:420px;
  padding:30px;
  border-radius:20px;
  background:rgba(17,24,39,.85);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
}

.logo{
  width:70px;
  height:70px;
  margin:auto;
  border-radius:16px;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  font-weight:bold;
}

h1{text-align:center;margin-top:10px;}
p{text-align:center;color:#94a3b8;}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.primary{background:#3b82f6;color:white;}
.secondary{background:#1f2937;color:white;}

#status{
  margin-top:10px;
  text-align:center;
  color:#38bdf8;
  min-height:20px;
}

/* DASHBOARD */
#dashboard{
  display:none;
}

.box{
  margin-top:15px;
  padding:12px;
  background:#0f172a;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.05);
}
.small{font-size:13px;color:#94a3b8;}
</style>
</head>

<body>

<div class="card">

  <div class="logo">Z</div>
  <h1>ZeroPrint</h1>
  <p>Testing Environment</p>

  <!-- AUTH -->
  <div id="auth">

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="primary" onclick="handleAuth()" id="mainBtn">
      Login
    </button>

    <button class="secondary" onclick="toggleMode()">
      Switch Mode
    </button>

    <div id="status"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <h2>Welcome 👋</h2>
    <p id="userEmail" class="small"></p>

    <div class="box">
      <h3>Getting Started</h3>
      <p class="small">
        • Build Supabase tables<br>
        • Add user profiles<br>
        • Expand dashboard features<br>
        • Secure your project
      </p>
    </div>

    <button class="primary" onclick="logout()">Logout</button>

  </div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://nerbfazadyzeqhwgxjyi.supabase.co",
  "sb_publishable_nnGcs-OLdYbN8KYRr8-QNQ_77QBFXCg"
);

let isLogin = true;

const auth = document.getElementById("auth");
const dashboard = document.getElementById("dashboard");
const status = document.getElementById("status");
const userEmail = document.getElementById("userEmail");

/* =========================
   FIX 1: SESSION ON LOAD
========================= */
window.addEventListener("load", async () => {
  const { data } = await supabase.auth.getSession();

  if (data.session) {
    showDashboard(data.session.user);
  }
});

/* =========================
   FIX 2: LISTEN FOR EMAIL LOGIN
========================= */
supabase.auth.onAuthStateChange((event, session) => {
  if (event === "SIGNED_IN" && session) {
    showDashboard(session.user);
  }
});

/* =========================
   TOGGLE MODE (LOGIN / SIGNUP)
========================= */
window.toggleMode = () => {
  isLogin = !isLogin;
  status.textContent = isLogin ? "Login mode" : "Sign up mode";
};

/* =========================
   LOGIN / SIGNUP
========================= */
window.handleAuth = async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(isLogin){

    status.textContent = "Logging in...";

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if(error){
      status.textContent = error.message;
      return;
    }

  } else {

    status.textContent = "Creating account...";

    const { error } = await supabase.auth.signUp({
      email,
      password,
      options: {
        emailRedirectTo: "https://YOURUSERNAME.github.io/YOURREPO/"
      }
    });

    if(error){
      status.textContent = error.message;
      return;
    }

    status.textContent = "Check your email to confirm.";
  }
};

/* =========================
   LOGOUT
========================= */
window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

/* =========================
   DASHBOARD
========================= */
function showDashboard(user){
  auth.style.display = "none";
  dashboard.style.display = "block";
  userEmail.textContent = user.email;
}

</script>

</body>
</html>
