<!DOCTYPE html>
<html>
<head>
  <title>Auth + AI Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 420px;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btn { background: #3b82f6; color: white; }
    .logout { background: #ef4444; color: white; }

    #dashboard { display: none; }

    .box {
      background: #1f2937;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .chat {
      height: 200px;
      overflow-y: auto;
      background: #0b1220;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 14px;
    }

    .msg {
      margin: 5px 0;
    }

    .user { color: #60a5fa; }
    .ai { color: #34d399; }
  </style>
</head>

<body>

<div class="card">

  <!-- LOGIN -->
  <div id="auth">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="btn" onclick="login()">Login</button>
    <button class="btn" onclick="signup()">Create Account</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <h2>Dashboard</h2>
    <p id="userEmail"></p>

    <button class="logout" onclick="logout()">Logout</button>

    <div class="box">
      <h3>AI Assistant</h3>

      <div class="chat" id="chat"></div>

      <input id="prompt" placeholder="Ask something...">
      <button class="btn" onclick="askAI()">Send</button>
    </div>

    <div class="box">
      <h3>Digital Footprint Scan</h3>
      <input id="target" placeholder="Enter username or email">
      <button class="btn" onclick="scanFootprint()">Analyze</button>
      <div id="footprint" class="chat"></div>
    </div>

  </div>

</div>

<script>
  const supabaseUrl = "https://nerbfazadyzeqhwgxjyi.supabase.co";
  const supabaseKey = "sb_publishable_nnGcs-OLdYbN8KYRr8-QNQ_77QBFXCg";

  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  function show(el) { document.getElementById(el).style.display = "block"; }
  function hide(el) { document.getElementById(el).style.display = "none"; }

  function showUser(user) {
    hide("auth");
    show("dashboard");
    document.getElementById("userEmail").innerText = user.email;
  }

  async function login() {
    const email = email.value;
    const password = password.value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email, password
    });

    if (error) return alert(error.message);

    showUser(data.user);
  }

  async function signup() {
    const email = email.value;
    const password = password.value;

    const { error } = await supabaseClient.auth.signUp({
      email, password
    });

    if (error) return alert(error.message);

    alert("Check email to confirm!");
  }

  async function logout() {
    await supabaseClient.auth.signOut();
    location.reload();
  }

  async function checkSession() {
    const { data } = await supabaseClient.auth.getSession();
    if (data.session) showUser(data.session.user);
  }

  checkSession();

  // ---------------- AI (SIMULATED GEMINI STYLE) ----------------

  async function askAI() {
    const input = document.getElementById("prompt");
    const chat = document.getElementById("chat");

    const msg = input.value;
    if (!msg) return;

    chat.innerHTML += `<div class="msg user">You: ${msg}</div>`;
    input.value = "";

    chat.innerHTML += `<div class="msg ai">AI: thinking...</div>`;

    setTimeout(() => {
      document.querySelector(".ai:last-child").remove();

      let response = generateAI(msg);

      chat.innerHTML += `<div class="msg ai">AI: ${response}</div>`;
    }, 800);
  }

  function generateAI(text) {
    text = text.toLowerCase();

    if (text.includes("hello")) return "Hello! I’m your dashboard assistant.";
    if (text.includes("who are you")) return "I am a simulated AI inside your Supabase dashboard.";
    if (text.includes("help")) return "Ask me anything or try the footprint scanner.";

    return "I processed your request: " + text;
  }

  // ---------------- DIGITAL FOOTPRINT (SIMULATED) ----------------

  function scanFootprint() {
    const target = document.getElementById("target").value;
    const out = document.getElementById("footprint");

    if (!target) return;

    out.innerHTML = "Scanning...";

    setTimeout(() => {
      out.innerHTML = `
        <div class="msg ai">Analysis for: ${target}</div>
        <div class="msg ai">• Public mentions: Low</div>
        <div class="msg ai">• Social presence: Minimal</div>
        <div class="msg ai">• Risk score: Low</div>
        <div class="msg ai">• Data sources: simulated demo</div>
      `;
    }, 1000);
  }
</script>

</body>
</html>
