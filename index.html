<!DOCTYPE html>
<html>
<head>
  <title>Supabase Auth Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial;
      max-width: 400px;
      margin: 60px auto;
    }
    input {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      padding: 10px;
      width: 100%;
      margin-top: 10px;
      cursor: pointer;
    }
    #app {
      display: none;
    }
  </style>
</head>
<body>

<h2>Login / Signup</h2>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signUp()">Create Account</button>
  <button onclick="signIn()">Login</button>
</div>

<div id="app">
  <h3>Welcome 👋</h3>
  <p id="user"></p>
  <button onclick="signOut()">Logout</button>
</div>

<script>
  // Your Supabase credentials
  const supabaseUrl = "https://nerbfazadyzeqhwgxjyi.supabase.co";
  const supabaseKey = "sb_publishable_nnGcs-OLdYbN8KYRr8-QNQ_77QBFXCg";

  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  const authDiv = document.getElementById("auth");
  const appDiv = document.getElementById("app");
  const userText = document.getElementById("user");

  // SIGN UP
  async function signUp() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password
    });

    if (error) {
      alert(error.message);
    } else {
      alert("Check your email to confirm signup!");
    }
  }

  // SIGN IN
  async function signIn() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      alert(error.message);
    } else {
      showUser(data.user);
    }
  }

  // SIGN OUT
  async function signOut() {
    await supabaseClient.auth.signOut();
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }

  // SHOW USER
  function showUser(user) {
    authDiv.style.display = "none";
    appDiv.style.display = "block";
    userText.innerText = user.email;
  }

  // CHECK SESSION ON LOAD
  async function checkUser() {
    const { data } = await supabaseClient.auth.getSession();

    if (data.session) {
      showUser(data.session.user);
    }
  }

  checkUser();
</script>

</body>
</html>
</body>
</html>
