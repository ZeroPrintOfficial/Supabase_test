<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroPrint Portal</title>

<style>
:root{
  --bg:#030712;
  --card:#111827;
  --accent:#3b82f6;
  --muted:#94a3b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top left,#2563eb40,transparent 40%),
              radial-gradient(circle at bottom right,#06b6d440,transparent 40%),
              var(--bg);
  color:white;
}

.card{
  width:420px;
  padding:30px;
  border-radius:20px;
  background:rgba(17,24,39,.85);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
}

.logo{
  width:70px;
  height:70px;
  margin:auto;
  border-radius:16px;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  font-weight:bold;
}

h1{text-align:center;margin-top:10px;}
p{text-align:center;color:var(--muted);}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.primary{background:var(--accent);color:white;}
.secondary{background:#1f2937;color:white;}
.link{
  background:transparent;
  color:#38bdf8;
  font-size:13px;
}

#status{
  margin-top:10px;
  text-align:center;
  color:#38bdf8;
  min-height:20px;
}

/* DASHBOARD */
#dashboard{
  display:none;
}

.box{
  margin-top:15px;
  padding:12px;
  background:#0f172a;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.05);
}
.small{font-size:13px;color:var(--muted);}
</style>
</head>

<body>

<div class="card">

  <div class="logo">Z</div>
  <h1>ZeroPrint</h1>
  <p>Testing Environment</p>

  <!-- AUTH -->
  <div id="auth">

    <p id="modeText">Login to continue</p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="primary" id="mainBtn" onclick="handleAuth()">Login</button>

    <button class="secondary" onclick="toggleMode()">
      Switch to Sign Up
    </button>

    <div id="status"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <h2>Welcome 👋</h2>
    <p id="userEmail" class="small"></p>

    <div class="box">
      <h3>Getting Started</h3>
      <p class="small">
        • Build your Supabase database<br>
        • Add secure tables<br>
        • Expand authentication<br>
        • Create user profiles
      </p>
    </div>

    <div class="box">
      <h3>Status</h3>
      <p class="small">You are logged in successfully.</p>
    </div>

    <button class="primary" onclick="logout()">Logout</button>

  </div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://nerbfazadyzeqhwgxjyi.supabase.co",
  "sb_publishable_nnGcs-OLdYbN8KYRr8-QNQ_77QBFXCg"
);

let isLogin = true;

const authBox = document.getElementById("auth");
const dashboard = document.getElementById("dashboard");
const status = document.getElementById("status");
const modeText = document.getElementById("modeText");
const mainBtn = document.getElementById("mainBtn");
const userEmail = document.getElementById("userEmail");

/* SESSION CHECK */
async function checkSession(){
  const { data } = await supabase.auth.getSession();
  if(data.session){
    showDashboard(data.session.user);
  }
}
checkSession();

/* AUTO LISTENER (fix email confirmation redirect issues) */
supabase.auth.onAuthStateChange((event, session) => {
  if(session){
    showDashboard(session.user);
  }
});

/* TOGGLE LOGIN / SIGNUP */
window.toggleMode = () => {
  isLogin = !isLogin;

  if(isLogin){
    modeText.textContent = "Login to continue";
    mainBtn.textContent = "Login";
  } else {
    modeText.textContent = "Create a new account";
    mainBtn.textContent = "Sign Up";
  }
};

/* LOGIN / SIGNUP HANDLER */
window.handleAuth = async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  status.textContent = isLogin ? "Logging in..." : "Creating account...";

  if(isLogin){

    const { error } =
      await supabase.auth.signInWithPassword({
        email,
        password
      });

    if(error){
      status.textContent = error.message;
      return;
    }

  } else {

    const { error } =
      await supabase.auth.signUp({
        email,
        password,
        options:{
          emailRedirectTo: window.location.origin
        }
      });

    if(error){
      status.textContent = error.message;
      return;
    }

    status.textContent = "Check your email to confirm account.";
  }
};

/* LOGOUT */
window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

/* SHOW DASHBOARD */
function showDashboard(user){
  authBox.style.display = "none";
  dashboard.style.display = "block";
  userEmail.textContent = user.email;
}

</script>

</body>
</html>
